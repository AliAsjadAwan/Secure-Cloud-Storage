<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Successful - Secure Cloud Storage</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1b3f 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e8eaf6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container-box {
            max-width: 500px;
            width: 100%;
        }
        .success-card {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.08) 0%, rgba(16, 185, 129, 0.04) 100%);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 16px;
            padding: 60px 40px;
            backdrop-filter: blur(10px);
            text-align: center;
        }
        .success-icon {
            font-size: 80px;
            margin-bottom: 24px;
            animation: checkmark 0.8s ease;
        }
        @keyframes checkmark {
            0% {
                transform: scale(0) rotate(-45deg);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1) rotate(0);
                opacity: 1;
            }
        }
        .success-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #22c55e 0%, #10b981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .success-message {
            color: rgba(232, 234, 246, 0.7);
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .success-details {
            background: rgba(232, 234, 246, 0.05);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 32px;
        }
        .detail-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .detail-item:last-child {
            margin-bottom: 0;
        }
        .detail-icon {
            font-size: 20px;
        }
        .action-btn {
            display: inline-block;
            background: linear-gradient(135deg, #a855f7 0%, #8b5cf6 100%);
            color: #fff;
            padding: 14px 40px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(168, 85, 247, 0.3);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container-box">
        <div class="success-card">
            <div class="success-icon">✅</div>
            <h1 class="success-title">Password Reset Successful</h1>
            <p class="success-message">Your password has been securely updated and you can now log in with your new credentials.</p>
            
            <div class="success-details">
                <div class="detail-item">
                    <div class="detail-icon">🔒</div>
                    <div>Password protected with military-grade encryption</div>
                </div>
                <div class="detail-item">
                    <div class="detail-icon">✓</div>
                    <div>Reset link has been invalidated</div>
                </div>
                <div class="detail-item">
                    <div class="detail-icon">🛡️</div>
                    <div>Your account is secure and ready to use</div>
                </div>
            </div>
            
            <a href="/login" class="action-btn">🔐 Sign In to Your Account</a>
        </div>
    </div>
</body>
</html>
