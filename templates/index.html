<!DOCTYPE html>
<html>
<head>

<title>
Secure Cloud Storage
</title>

</head>

<body>

<h1>
Secure Cloud Storage using Encryption
</h1>


<h2>
Upload File
</h2>

<form action="/upload"
method="post"
enctype="multipart/form-data">

<input type="file"
name="file">

<button>
Upload
</button>

</form>


<h2>
Decrypt File
</h2>

<form action="/decrypt"
method="post">

<input
name="filename"
placeholder="example.txt.enc">

<button>
Decrypt
</button>

</form>

</body>
</html>
