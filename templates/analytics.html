<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Dashboard - Secure Cloud Storage</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1b3f 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e8eaf6;
            padding: 40px 20px;
        }
        .container { max-width: 1000px; }
        .page-header {
            margin-bottom: 40px;
        }
        .page-header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 28px;
            transition: all 0.3s ease;
            text-align: center;
        }
        .stat-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-4px);
        }
        .stat-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 12px;
            font-weight: 500;
        }
        .stat-number {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #a855f7 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .chart-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 32px;
        }
        .chart-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 24px;
        }
        .btn-back {
            background: rgba(168, 85, 247, 0.2);
            border: 1px solid rgba(168, 85, 247, 0.3);
            color: #a855f7;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn-back:hover {
            background: rgba(168, 85, 247, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>📊 Activity Dashboard</h1>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">📤 Total Uploads</div>
                <div class="stat-number">{{uploads}}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📥 Total Downloads</div>
                <div class="stat-number">{{downloads}}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">🔐 Total Logins</div>
                <div class="stat-number">{{logins}}</div>
            </div>
        </div>
        
        <div class="chart-section">
            <div class="chart-title">📈 Activity Overview</div>
            <canvas id="activityChart" style="max-height: 300px;"></canvas>
        </div>
        
        <a href="/dashboard" class="btn-back">← Back to Dashboard</a>
    </div>
    
    <script>
        const ctx = document.getElementById('activityChart').getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 300);
        gradient.addColorStop(0, 'rgba(168, 85, 247, 0.3)');
        gradient.addColorStop(1, 'rgba(168, 85, 247, 0.05)');
        
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Uploads', 'Downloads', 'Logins'],
                datasets: [{
                    label: 'Activity Count',
                    data: [{{uploads}}, {{downloads}}, {{logins}}],
                    backgroundColor: gradient,
                    borderColor: '#a855f7',
                    borderWidth: 2,
                    borderRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: {
                        labels: { color: '#fff' }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: { 
                            color: 'rgba(255, 255, 255, 0.6)',
                            stepSize: 1
                        },
                        grid: { color: 'rgba(255, 255, 255, 0.1)' }
                    },
                    x: {
                        ticks: { color: 'rgba(255, 255, 255, 0.6)' },
                        grid: { color: 'rgba(255, 255, 255, 0.1)' }
                    }
                }
            }
        });
    </script>
</body>
</html>
